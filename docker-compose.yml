services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: github-rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: github_rag
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Redis Cache and Session Store
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: github-rag-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Ollama LLM Service
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: github-rag-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - github-rag-network
    restart: unless-stopped
    # GPU support removed for macOS compatibility
    # For Linux with NVIDIA GPU, uncomment the deploy section below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ============================================================================
  # FastAPI Backend
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github-rag-backend
    environment:
      # Application
      APP_NAME: "GitHub Codebase RAG Assistant"
      APP_VERSION: "1.0.0"
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      
      # API
      API_V1_PREFIX: /api/v1
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost","http://frontend:3000"]'
      
      # Database
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/github_rag
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 10
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      REDIS_MAX_CONNECTIONS: 50
      
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: codellama:7b
      OLLAMA_TIMEOUT: 120
      OLLAMA_MAX_RETRIES: 3
      
      # Embeddings
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: 384
      EMBEDDING_BATCH_SIZE: 32
      EMBEDDING_DEVICE: cpu
      
      # Chunking
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 50
      MAX_CHUNK_SIZE: 1024
      
      # Search
      DEFAULT_TOP_K: 10
      MAX_TOP_K: 100
      HYBRID_SEARCH_ALPHA: 0.5
      
      # RAG
      MAX_CONTEXT_TOKENS: 4096
      MAX_RESPONSE_TOKENS: 2048
      RAG_TEMPERATURE: 0.7
      
      # Session
      SESSION_TTL_HOURS: 24
      CACHE_TTL_HOURS: 1
      
      # Storage
      REPO_STORAGE_PATH: /app/data/repositories
      FAISS_INDEX_PATH: /app/data/indices
      
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 60
      RATE_LIMIT_BURST: 10
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-min-32-chars-required}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Monitoring
      ENABLE_METRICS: "true"
      METRICS_PORT: 9090
    volumes:
      - repo_storage:/app/data/repositories
      - faiss_indices:/app/data/indices
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Celery Worker for Background Jobs
  # ============================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github-rag-celery-worker
    command: celery -A app.jobs.worker worker --loglevel=info --concurrency=2
    environment:
      # Application
      APP_NAME: "GitHub Codebase RAG Assistant"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      
      # Database
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/github_rag
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: codellama:7b
      
      # Embeddings
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DEVICE: cpu
      
      # Storage
      REPO_STORAGE_PATH: /app/data/repositories
      FAISS_INDEX_PATH: /app/data/indices
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-min-32-chars-required}
    volumes:
      - repo_storage:/app/data/repositories
      - faiss_indices:/app/data/indices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Next.js Frontend
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    container_name: github-rag-frontend
    environment:
      # API URL for client-side requests (through nginx proxy)
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # NGINX Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: github-rag-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Prometheus Monitoring
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: github-rag-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-rag-network
    restart: unless-stopped

  # ============================================================================
  # Grafana Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: github-rag-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-rag-network
    restart: unless-stopped

# ============================================================================
# Volumes for Persistent Data
# ============================================================================
volumes:
  postgres_data:
    driver: local
    name: github-rag-postgres-data
  
  redis_data:
    driver: local
    name: github-rag-redis-data
  
  ollama_models:
    driver: local
    name: github-rag-ollama-models
  
  repo_storage:
    driver: local
    name: github-rag-repo-storage
  
  faiss_indices:
    driver: local
    name: github-rag-faiss-indices
  
  prometheus_data:
    driver: local
    name: github-rag-prometheus-data
  
  grafana_data:
    driver: local
    name: github-rag-grafana-data

# ============================================================================
# Networks
# ============================================================================
networks:
  github-rag-network:
    driver: bridge
    name: github-rag-network
